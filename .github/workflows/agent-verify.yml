name: Agent Verify

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Node deps if present
        run: |
          if [ -f package-lock.json ]; then npm ci; fi
          if [ -f package.json ] && [ ! -d node_modules ]; then npm install; fi
      - name: Install Python deps if present
        run: |
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then python -m pip install -e ".[dev]" || python -m pip install -e .; fi
      - name: Install ruff (lint gate)
        run: python -m pip install ruff==0.12.2
      - name: Agent verification
        run: python .claude/tools/verify.py --full
